name: Build and Test BLAS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y autoconf automake libtool build-essential

      - name: Regenerate autotools files
        run: autoreconf -fi

      - name: Make configure executable
        run: chmod +x configure

      - name: Configure
        run: ./configure

      - name: Build
        run: make

      - name: Run testbench
        run: ./test/testbench
