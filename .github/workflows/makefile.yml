name: Build and Test BLAS

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x configure test/testbench

      - name: Configure
        run: ./configure

      - name: Build
        run: make

      - name: Run testbench
        run: ./test/testbench
